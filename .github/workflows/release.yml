name: Release

on:
  release:
    types: [created]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_suffix: linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_suffix: linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential musl-tools

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      - name: Build binaries (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binaries (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/airc dist/airc-${{ matrix.asset_suffix }}
          cp target/${{ matrix.target }}/release/aircd dist/aircd-${{ matrix.asset_suffix }}
          # Strip binaries to reduce size (skip cross-compiled)
          if [ "${{ matrix.target }}" != "aarch64-unknown-linux-musl" ]; then
            strip dist/airc-${{ matrix.asset_suffix }} || true
            strip dist/aircd-${{ matrix.asset_suffix }} || true
          fi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/airc-${{ matrix.asset_suffix }} \
            dist/aircd-${{ matrix.asset_suffix }} \
            --clobber

      - name: Upload aircd binary as workflow artifact
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: aircd-linux-x86_64
          path: dist/aircd-linux-x86_64

  docker:
    name: Push aircd to GHCR
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download pre-built aircd binary
        uses: actions/download-artifact@v4
        with:
          name: aircd-linux-x86_64
          path: .

      - name: Prepare binary for Docker context
        run: |
          mv aircd-linux-x86_64 aircd
          chmod +x aircd

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aircd:latest
            ghcr.io/${{ github.repository_owner }}/aircd:${{ steps.tag.outputs.version }}

  npm:
    name: Publish @marlinski/airc to npm
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install
        working-directory: packages/airc-client-ts

      - name: Bump version to match release tag
        run: npm version ${{ steps.tag.outputs.version }} --no-git-tag-version
        working-directory: packages/airc-client-ts

      - name: Publish
        run: npm publish
        working-directory: packages/airc-client-ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
