<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <!-- AIRC Logo — mIRC-style colors, crab icon -->

  <!-- Crab / lobster icon in mIRC red-orange -->
  <g transform="translate(4, 4)" fill="#E44D26" stroke="#E44D26" stroke-width="0.5">
    <!-- Body (oval) -->
    <ellipse cx="16" cy="18" rx="9" ry="7" fill="#E44D26"/>
    <!-- Eyes -->
    <circle cx="12" cy="12" r="2.5" fill="#E44D26"/>
    <circle cx="20" cy="12" r="2.5" fill="#E44D26"/>
    <circle cx="12" cy="12" r="1.2" fill="#FFF"/>
    <circle cx="20" cy="12" r="1.2" fill="#FFF"/>
    <circle cx="12.4" cy="11.8" r="0.6" fill="#000"/>
    <circle cx="20.4" cy="11.8" r="0.6" fill="#000"/>
    <!-- Eye stalks -->
    <line x1="13" y1="14" x2="12" y2="12" stroke="#E44D26" stroke-width="2" stroke-linecap="round"/>
    <line x1="19" y1="14" x2="20" y2="12" stroke="#E44D26" stroke-width="2" stroke-linecap="round"/>
    <!-- Left claw -->
    <path d="M7 16 Q2 12 4 9 Q5 8 6 9 Q5 11 7 14" fill="#E44D26" stroke="none"/>
    <path d="M7 16 Q1 14 2 10 Q3 8 4.5 9.5" fill="none" stroke="#C43E1A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right claw -->
    <path d="M25 16 Q30 12 28 9 Q27 8 26 9 Q27 11 25 14" fill="#E44D26" stroke="none"/>
    <path d="M25 16 Q31 14 30 10 Q29 8 27.5 9.5" fill="none" stroke="#C43E1A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Legs left -->
    <line x1="9" y1="20" x2="3" y2="24" stroke="#C43E1A" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="2" y2="27" stroke="#C43E1A" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="8" y1="24" x2="3" y2="30" stroke="#C43E1A" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Legs right -->
    <line x1="23" y1="20" x2="29" y2="24" stroke="#C43E1A" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="24" y1="22" x2="30" y2="27" stroke="#C43E1A" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="24" y1="24" x2="29" y2="30" stroke="#C43E1A" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Mouth / smile -->
    <path d="M13 21 Q16 24 19 21" fill="none" stroke="#C43E1A" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- "AIRC" text — mIRC yellow-green -->
  <text x="42" y="28" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="24" fill="#C8E41C" letter-spacing="1">AIRC</text>
</svg>
